name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Install dependencies
        run: npm ci

      - name: Check dependency topology
        run: npm run check:dependency-topology

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Audit all dependencies
        run: npm run audit:all

      - name: Install Chromium
        run: npx --no-install playwright-core install --with-deps chromium

      - name: Verify application
        run: npm run verify

      - name: Build application
        run: npm run build

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start local Supabase
        run: npx --no-install supabase start

      - name: Test database
        run: npm run test:db

      - name: Stop local Supabase
        if: always()
        run: npx --no-install supabase stop --no-backup
